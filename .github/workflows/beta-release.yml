name: Build and Beta Release

on:
  push:
    tags:
      - 'v*-beta*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          # Tag form: v0.2.25-beta.1
          TAG=${GITHUB_REF#refs/tags/v}
          echo "name=$TAG" >> $GITHUB_OUTPUT
          # versionCode uses only the base version (before -beta) so a beta never
          # blocks upgrading to its corresponding stable release — e.g. both
          # 0.2.25-beta.1 and stable 0.2.25 resolve to versionCode 225.
          BASE=$(echo "$TAG" | sed 's/-.*//')
          VERSION_CODE=$(echo "$BASE" | sed 's/\.//g' | sed 's/[^0-9]//g')
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Signature for Release
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Release signing secrets are not fully configured. Set all four repository secrets — KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD — under Settings → Secrets and variables → Actions. Refusing to build: a debug-signed release would not be upgradeable across versions."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.jks
          echo "RELEASE_STORE_FILE=release.jks" >> local.properties
          echo "RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD" >> local.properties
          echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> local.properties
          echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> local.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          BUILD_DATE: ${{ steps.date.outputs.date }}

      - name: Rename APK with version and date
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          NEW_NAME="MultiFingerGestureX-v${{ steps.version.outputs.name }}-${{ steps.date.outputs.date }}.apk"
          NEW_PATH="app/build/outputs/apk/release/$NEW_NAME"
          mv "$APK_PATH" "$NEW_PATH"
          echo "path=$NEW_PATH" >> $GITHUB_OUTPUT

      - name: Create GitHub Prerelease
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          name: '[Beta] v${{ steps.version.outputs.name }}'
          prerelease: true
          generate_release_notes: true
          body: |
            > ⚠️ **Beta build** — for testing only. Not published to the Xposed Modules Repo, and not offered as an update to stable-channel users.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
